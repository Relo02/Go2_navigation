# links.yaml
# CHAMP link map for the Unitree Go2.
#
# Source: khaledgabr77/unitree_go2_ros2 / unitree_go2_sim/config/links/links.yaml
# Port change: foot link names updated to CHAMP uppercase convention:
#   lf_foot_link → LF_FOOT
#   rf_foot_link → RF_FOOT
#   lh_foot_link → LH_FOOT
#   rh_foot_link → RH_FOOT
# These names match the link names generated by leg.xacro.
/**:
  ros__parameters:
    links_map:
      base: base_link

      left_front:
        - lf_hip_link
        - lf_upper_leg_link
        - lf_lower_leg_link
        - LF_FOOT

      right_front:
        - rf_hip_link
        - rf_upper_leg_link
        - rf_lower_leg_link
        - RF_FOOT

      left_hind:
        - lh_hip_link
        - lh_upper_leg_link
        - lh_lower_leg_link
        - LH_FOOT

      right_hind:
        - rh_hip_link
        - rh_upper_leg_link
        - rh_lower_leg_link
        - RH_FOOT
