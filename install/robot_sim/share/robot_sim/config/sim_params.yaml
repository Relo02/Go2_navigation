# sim_params.yaml
# Simulation-specific parameter overrides.
#
# use_sim_time=true is set via the sim_bringup.launch.py launch argument and
# propagated to all nodes automatically.  No per-node overrides are needed here.
#
# The Gazebo plugins in go2_sim/urdf/go2_sim.urdf.xacro publish directly on
# /lidar/points, /unilidar/imu, /odom, and TF(odom→base_footprint).
# No topic bridge or remapping is required.
#
# TODO(agibot): Add D1 Ultra specific overrides here if needed when
#   d1_sim/urdf/d1_sim.urdf.xacro is implemented.
