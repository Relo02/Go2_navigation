# nav2_params.yaml
# Robot-agnostic Nav2 configuration.
# Tuned for a Unitree Go2 quadruped navigation stack.
#
# Localisation is provided by slam_toolbox (map → odom TF).
# Odometry (odom → base_footprint) is provided by go2_hw_bridge.
#
# ASSUMPTIONS:
#   A-NAV-1: Robot is configured as holonomic in DWB with constrained lateral motion.
#   A-NAV-2: Sim LiDAR PointCloud2 on /lidar/points is filtered to
#            /lidar/points_filtered for voxel costmaps.
#            LaserScan on /scan (lidar_link frame) is still produced from the
#            raw cloud for slam_toolbox.
#   A-NAV-3: map → odom is published by slam_toolbox (not AMCL).
#             AMCL section below is kept for reference but excluded from lifecycle.
#   A-NAV-4: Nav2 Humble publishes geometry_msgs/Twist on /cmd_vel.
#             go2_hw_bridge converts this directly to sport API Move commands.
#
# NOTE — use_sim_time: false appears on every node below.
#   nav2_bringup's RewrittenYaml rewrites ALL occurrences of use_sim_time at
#   launch time when use_sim_time:=true is passed (sim) or false (hardware).
#   The value written here is irrelevant at runtime; it is always overridden.
#
# NOTE — lifecycle_manager section below is NOT read by nav2_bringup.
#   navigation_launch.py creates its own lifecycle_manager node with a hardcoded
#   node list.  The section is kept here for documentation purposes only.

# ═══════════════════════════════════════════════════════════════════════════════
# amcl — Adaptive Monte Carlo Localisation
# Used when navigating on a pre-built map.  Disabled when using SLAM-only mode.
# TODO(localization): Tune alpha, laser, and initial pose params for Go2 IMU motion.
# ═══════════════════════════════════════════════════════════════════════════════
amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

# ═══════════════════════════════════════════════════════════════════════════════
# map_server
# ═══════════════════════════════════════════════════════════════════════════════
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""  # Overridden via launch argument --map

# ═══════════════════════════════════════════════════════════════════════════════
# map_saver
# ═══════════════════════════════════════════════════════════════════════════════
map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ═══════════════════════════════════════════════════════════════════════════════
# planner_server
# Uses NavFn (Dijkstra) for reliable global path planning in grid maps.
# TODO(tuning): Switch to SmacPlannerHybrid for kinodynamic-aware planning.
# ═══════════════════════════════════════════════════════════════════════════════
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ═══════════════════════════════════════════════════════════════════════════════
# smoother_server
# ═══════════════════════════════════════════════════════════════════════════════
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ═══════════════════════════════════════════════════════════════════════════════
# controller_server
# Uses DWB (Dynamic Window Approach with critics) as the local trajectory planner.
# ═══════════════════════════════════════════════════════════════════════════════
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5      # was 0.3 (6 cycles) — too short; 0.5 s = 10 cycles before recovery
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 15.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance:  0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      # DWB does not define a separate footprint polygon here; it inherits
      # collision geometry from the active local/global costmap footprint.

      # Velocity limits (Go2 physically constrained safe nav defaults)
      min_vel_x: -0.3
      min_vel_y: -0.3
      max_vel_x: 1.0
      max_vel_y: 0.3
      min_vel_theta: -1.5
      max_vel_theta: 1.5
      min_speed_xy: 0.0
      max_speed_xy: 1.0
      min_speed_theta: 0.05

      # Acceleration limits
      acc_lim_x: 0.5
      acc_lim_y: 0.3
      acc_lim_theta: 1.2
      decel_lim_x: -1.0
      decel_lim_y: -0.5
      decel_lim_theta: -2.0

      # Sampling
      vx_samples: 20
      vy_samples: 10
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025

      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05  # was 0.25 (50% of max_vel_x) — caused RotateToGoal to trigger while still moving
      short_circuit_trajectory_evaluation: true
      stateful: true

      # DWB critics
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]

      BaseObstacle.scale: 0.2    # prioritize obstacle clearance with higher cruise speed
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 16.0   # was 32.0 — equal to PathDist/PathAlign, caused trajectory deadlock near goal
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ═══════════════════════════════════════════════════════════════════════════════
# local_costmap
# Uses 2-D /scan for SLAM-aligned obstacle data plus a filtered 3-D cloud voxel
# layer for safer near-field obstacle handling without self-marking.
# ═══════════════════════════════════════════════════════════════════════════════
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width:  4
      height: 4
      resolution: 0.05
      update_frequency:  15.0
      publish_frequency: 5.0
      transform_tolerance: 0.3

      # Robot footprint including legs at nominal standing stance.
      # Source: Unitree Go2 official dimensions 700 mm × 310 mm (standing).
      #   X: ±0.350 m — full length fore/aft including leg reach
      #   Y: ±0.155 m — full width including hip abduction to foot contact
      # The URDF trunk collision box (440 × 120 mm) represents the torso only.
      # This footprint correctly represents the full swept area.
      # circumscribed_radius = sqrt(0.350² + 0.155²) = 0.383 m
      footprint: "[ [-0.35, -0.155], [-0.35, 0.155], [0.35, 0.155], [0.35, -0.155] ]"
      footprint_padding: 0.01

      plugins: ["voxel_layer", "obstacle_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        footprint_clearing_enabled: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.05
        max_obstacle_height: 2.0
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1
        observation_sources: cloud
        cloud:
          topic: /lidar/points_filtered
          data_type: "PointCloud2"
          clearing: true
          marking: true
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          obstacle_min_range: 0.05
          obstacle_max_range: 4.0
          raytrace_min_range: 0.05
          raytrace_max_range: 4.5
          inf_is_valid: false
          expected_update_rate: 10.0

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          obstacle_max_range:  10.0       # [m] mark obstacles up to this range
          obstacle_min_range:   0.05
          raytrace_max_range:  12.0       # [m] clear free space up to this range
          raytrace_min_range:   0.0
          clearing: true
          marking: true
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.58

# ═══════════════════════════════════════════════════════════════════════════════
# global_costmap
# Static map layer + filtered cloud / scan obstacle overlay.
# Assumption A-NAV-3: a map YAML file is provided at launch time.
# For mapless / SLAM-only operation, comment out the static_layer plugin.
# ═══════════════════════════════════════════════════════════════════════════════
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: true
      width: 30
      height: 30
      resolution: 0.05
      update_frequency: 1.0
      publish_frequency: 1.0
      transform_tolerance: 0.5
      track_unknown_space: true

      # Robot footprint including legs at nominal standing stance.
      # Source: Unitree Go2 official dimensions 700 mm × 310 mm (standing).
      #   X: ±0.350 m — full length fore/aft including leg reach
      #   Y: ±0.155 m — full width including hip abduction to foot contact
      # The URDF trunk collision box (440 × 120 mm) represents the torso only.
      # This footprint correctly represents the full swept area.
      # circumscribed_radius = sqrt(0.350² + 0.155²) = 0.383 m
      footprint: "[ [-0.35, -0.155], [-0.35, 0.155], [0.35, 0.155], [0.35, -0.155] ]"
      footprint_padding: 0.01

      # For SLAM-only (no pre-built map): remove static_layer from this list
      plugins: ["static_layer", "voxel_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        footprint_clearing_enabled: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.05
        max_obstacle_height: 2.0
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1
        observation_sources: cloud
        cloud:
          topic: /lidar/points_filtered
          data_type: "PointCloud2"
          clearing: true
          marking: true
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          obstacle_min_range: 0.05
          obstacle_max_range: 6.0
          raytrace_min_range: 0.05
          raytrace_max_range: 6.5
          inf_is_valid: false
          expected_update_rate: 5.0

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          obstacle_max_range:  10.0
          obstacle_min_range:   0.05
          raytrace_max_range:  12.0
          raytrace_min_range:   0.0
          clearing: true
          marking: true
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.68

# ═══════════════════════════════════════════════════════════════════════════════
# bt_navigator
# ═══════════════════════════════════════════════════════════════════════════════
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
    # Default Nav2 BT — handles replanning and recovery automatically
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    # Plugin list verified against libraries present in ros-humble-navigation2.
    # Checked via: find /opt/ros/humble/lib -name "libnav2*bt*" | sort
    plugin_lib_names:
      # ── Action nodes ─────────────────────────────────────────────────────
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_wait_action_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_back_up_action_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_navigate_through_poses_action_bt_node
      # ── Condition nodes ───────────────────────────────────────────────────
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      # ── Decorator / control nodes ─────────────────────────────────────────
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_single_trigger_bt_node
      # ── Selector nodes ────────────────────────────────────────────────────
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_planner_selector_bt_node
      - nav2_smoother_selector_bt_node
      - nav2_progress_checker_selector_bt_node

# ═══════════════════════════════════════════════════════════════════════════════
# behavior_server  (recovery behaviours)
# ═══════════════════════════════════════════════════════════════════════════════
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic:  local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic:  local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.5
    min_rotational_vel: 0.05
    rotational_acc_lim: 1.2
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"

# ═══════════════════════════════════════════════════════════════════════════════
# waypoint_follower
# ═══════════════════════════════════════════════════════════════════════════════
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ═══════════════════════════════════════════════════════════════════════════════
# velocity_smoother
# ═══════════════════════════════════════════════════════════════════════════════
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.3, 1.5]
    min_velocity: [-0.3, -0.3, -1.5]
    max_accel: [0.5, 0.3, 1.2]
    max_decel: [-1.0, -0.5, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.01]
    velocity_timeout: 1.0

# ═══════════════════════════════════════════════════════════════════════════════
# lifecycle_manager  (navigation)
# ═══════════════════════════════════════════════════════════════════════════════
lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    # slam_toolbox and map_server are NOT in this list:
    #   - slam_toolbox manages its own lifecycle.
    #   - map_server is not needed when slam_toolbox provides the map.
    # Add map_server + amcl here if switching to AMCL + pre-built map mode.
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
